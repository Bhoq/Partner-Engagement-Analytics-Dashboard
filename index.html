<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Product Analytics & Attribution Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root{
      --bg:#f5f7fb;
      --surface:#ffffff;
      --surface2:#f9fbff;
      --text:#172033;
      --muted:#64748b;
      --line:#e5eaf2;
      --brand:#2563eb;
      --brand2:#7c3aed;
      --good:#0f9f6e;
      --warn:#d97706;
      --bad:#dc2626;
      --radius:18px;
      --shadow:0 14px 34px rgba(20,31,56,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.08), transparent 24%),
        radial-gradient(circle at top right, rgba(124,58,237,.08), transparent 22%),
        var(--bg);
    }
    .container{max-width:1440px;margin:0 auto;padding:28px 18px 42px}
    .hero{
      background:linear-gradient(135deg, rgba(37,99,235,.96), rgba(124,58,237,.96));
      color:#fff;border-radius:28px;padding:28px;box-shadow:var(--shadow);
      display:grid;grid-template-columns:2fr 1fr;gap:18px;align-items:end;
    }
    .hero h1{margin:0 0 8px;font-size:clamp(28px,4vw,40px);line-height:1.05}
    .hero p{margin:0;color:rgba(255,255,255,.9);max-width:900px}
    .hero .pillwrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
    .pill{
      padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.18);font-size:13px
    }
    .grid{display:grid;gap:18px;margin-top:18px}
    .controls{grid-template-columns:1.6fr 1.4fr}
    .card{
      background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:18px
    }
    .card h2,.card h3{margin:0 0 10px}
    .sub{color:var(--muted);font-size:13px}
    .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .upload-box{
      border:2px dashed #cfd7e6;border-radius:16px;padding:16px;background:var(--surface2);
      min-height:136px;display:flex;flex-direction:column;justify-content:center;gap:10px
    }
    .upload-box strong{font-size:15px}
    .upload-box small{color:var(--muted)}
    .upload-box input[type=file]{display:block;width:100%}
    .button-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button,.btn{
      background:var(--brand);color:#fff;border:none;border-radius:12px;padding:11px 14px;
      cursor:pointer;font-weight:600
    }
    button.secondary,.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    button.ghost,.btn.ghost{background:#f8fafc;color:var(--text);border:1px solid var(--line)}
    .toolbar{
      display:grid;grid-template-columns:repeat(6, minmax(0,1fr));gap:12px;align-items:end
    }
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input[type=date], select{
      width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff
    }
    .kpis{grid-template-columns:repeat(6,minmax(0,1fr))}
    .kpi{
      background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)
    }
    .kpi .label{font-size:12px;color:var(--muted);margin-bottom:8px}
    .kpi .value{font-size:28px;font-weight:800;letter-spacing:-0.02em}
    .kpi .delta{font-size:12px;margin-top:8px;color:var(--muted)}
    .section-title{display:flex;justify-content:space-between;gap:10px;align-items:flex-end}
